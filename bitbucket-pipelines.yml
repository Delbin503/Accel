image: node:20

pipelines:
  branches:
    main:
      - step:
          name: Deploy to Vercel
          caches:
            - node
          script:
            - npm install
            - npm install -g vercel
            - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            - CI=false vercel build --prod --token=$VERCEL_TOKEN
            - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN